<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다 (404)</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f9fc;
        color: #2a2f45;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .container {
        text-align: center;
        max-width: 440px;
        padding: 30px;
        border-radius: 16px;
        background: white;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      }
      h1 { margin: 0 0 16px; font-size: 52px; }
      p { margin: 8px 0 20px; font-size: 17px; }
      a {
        display: inline-block;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        background: #aa3bff;
        color: white;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>죄송합니다. 요청하신 페이지를 찾을 수 없습니다.</p>
      <a href="/">홈으로 돌아가기</a>
    </div>
  </body>
</html>
